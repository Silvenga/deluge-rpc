name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: simple
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-libs:
    name: Publish (crates.io)
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
      - name: Publish deluge-rpc-rencode
        run: cargo publish -p deluge-rpc-rencode
      - name: Wait for index propagation
        run: sleep 20
      - name: Publish deluge-rpc-models
        run: cargo publish -p deluge-rpc-models
      - name: Wait for index propagation
        run: sleep 20
      - name: Publish deluge-rpc-client
        run: cargo publish -p deluge-rpc-client

  build-cli-linux:
    name: Build CLI (Linux)
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Mozilla-Actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
      - name: Ensure cross is installed
        run: cargo install cross
      - name: Build
        run: cross build --target x86_64-unknown-linux-gnu --release -p deluge-cli
      - name: Rename artifact
        run: mv target/x86_64-unknown-linux-gnu/release/deluge-cli target/x86_64-unknown-linux-gnu/release/deluge-cli-x86_64-unknown-linux-gnu
      - name: Upload Release Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} target/x86_64-unknown-linux-gnu/release/deluge-cli-x86_64-unknown-linux-gnu --clobber

  build-cli-windows:
    name: Build CLI (Windows)
    runs-on: windows-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Mozilla-Actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release -p deluge-cli
      - name: Rename artifact
        run: move target\release\deluge-cli.exe target\release\deluge-cli-x86_64-pc-windows-msvc.exe
      - name: Upload Release Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} target/release/deluge-cli-x86_64-pc-windows-msvc.exe --clobber

