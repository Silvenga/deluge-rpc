# Interval between retention sweeps (human-readable duration).
# Minimum: 1 second.
poll_interval = "5m"

# Deluge hosts to manage. At least one host is required.
[[hosts]]
# Daemon hostname or IP address.
host = "deluge"
# Daemon TCP port. Defaults to 58846.
port = 58846
# Username for daemon authentication. Defaults to localclient.
username = "localclient"
# Plaintext password. Mutually exclusive with password_env.
password = "change-me"

[[hosts]]
host = "deluge-2"
port = 58846
username = "localclient"
# Name of the environment variable holding the password.
# Mutually exclusive with password.
password_env = "DELUGE_PASSWORD_2"

# Retention rules applied to every host.
[rules]
# Minimum swarm-wide seed count (Deluge total_seeds) below which a torrent is
# retained. Must be >= 1.
min_seeders = 10

# Minimum age in days a torrent must reach before it is eligible for deletion.
# Must be >= 1.
min_age_days = 28

# Free-space threshold (bytes) below which retention is triggered.
# Accepts human-readable sizes like "50 GiB", "100 GB", etc.
low_water_mark = "50 GiB"

# Free-space threshold (bytes) above which retention pauses.
# Must be greater than low_water_mark.
high_water_mark = "100 GiB"

# Minimum seconds between two deletion operations for the same host.
# 0 disables throttling.
delete_throttle_secs = 30
